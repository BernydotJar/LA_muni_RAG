      - docs/decisions/055-isolated-raw-pdf-extraction.md
      - docs/risks/055-isolated-raw-pdf-risk-register.md
      - docs/traceability/055-requirements-traceability.md
    depends_on:
      - WS03-ARTIFACT-SAFETY-001
      - PRG-CTX7-001
    blockers: []
    acceptance:
      - "Raw PDF bytes use a real binary parser; the legacy PDF JSONL adapter is explicit and cannot be selected through the extractor registry."
      - "Untrusted parsing runs in a separate child with fixed permissions and bounded input, time, pages, per-page text, total text, output, stderr, memory settings, and concurrency."
      - "Malformed, encrypted, no-text, timeout, crash, stderr/output flood, and protocol failures map to stable fail-closed errors."
      - "The exact safety-verified buffer is parsed once and the resulting normalized document is passed to indexing without path reread or reparse."
      - "Document chunk count and provider embedding batch size fail closed at fixed upper bounds before unbounded provider work."
    evidence:
      - "Commit 3a7b531 pins pdfjs-dist 6.1.200 and @napi-rs/canvas 1.0.2 as exact direct production dependencies and copies the extraction worker into the runtime image."
      - "The PDF worker accepts only stdin bytes and returns strict v1 JSON; its minimal environment/private cwd and Node permission flags deny unmanaged reads, writes, child processes, and worker threads while allowing the required native addon."
      - "The scanner now receives a private 0700-directory/0600-file snapshot of the verified buffer; before/after snapshot hashes and a managed-path recheck close the observed A-to-B-to-A mutation window."
      - "Document-library ingestion passes the normalized document plus exact verified bytes to vector indexing; direct raw-PDF indexing/backfill routes fail before provider invocation or file parsing."
      - "Focused PDF/library/vector/indexer/corpus/backfill/artifact suites passed 80/80; canonical global Node summary passed 498/498 with zero skips or failures."
      - "Typecheck, build, Pages, inventory, contracts, and 6/6 domain evaluation passed; 16 changed Markdown files contained 11 local links and zero missing targets."
      - "npm audit --omit=dev reported zero vulnerabilities; the node:24.12.0-bookworm-slim production image built and a non-root in-container raw-PDF extraction smoke passed."
      - "The controlled DMP remained ignored and untouched: acquired only, artifactSafety null, with no scan, extraction, indexing, promotion, or inventory mutation."
    limitations:
      - "The child is not a complete OS sandbox: no network namespace, seccomp profile, or hard total-RSS/native-memory cap has been proved."
      - "The parser uses a native canvas addon; concurrency is per application process rather than distributed, and no load/capacity gate has been run."
      - "No OCR, table, form, or semantic-layout extraction exists; parser upgrades may change text normalization and hashes."
      - "A real scanner, authenticated tenant-scoped API, durable object storage, job/retry/lock/audit/retention system, and tenant-scoped vector persistence remain absent."
      - "The real DMP remains acquired only and has no clean malware verdict."
    pr: null
    ci: passed_local_with_platform_limitations
