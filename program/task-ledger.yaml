- id: WS03-PDF-EXTRACTION-001
  workstream: WS-03
  title: Add bounded isolated raw-PDF extraction and parse-once indexing
  status: completed_with_limitations
  owner: /root
  files:
  - .env.example
  - Dockerfile
  - package.json
  - package-lock.json
  - scripts/pdf-extraction-worker.mjs
  - src/ingestion/extractors/rawPdfExtractor.ts
  - src/ingestion/extractors/pdfExtractorAdapter.ts
  - src/ingestion/registry.ts
  - src/ingestion/types.ts
  - src/ingestion/vectorIndexing.ts
  - src/ingestion/corpusManifest.ts
  - src/cli/backfillCorpus.ts
  - src/embeddings/indexer.ts
  - src/sources/artifactSafety.ts
  - src/sources/documentLibraryOperations.ts
  - specs/055-isolated-raw-pdf-extraction.md
  - docs/raw-pdf-extraction.md
  - docs/decisions/055-isolated-raw-pdf-extraction.md
  - docs/risks/055-isolated-raw-pdf-risk-register.md
  - docs/traceability/055-requirements-traceability.md
  depends_on:
  - WS03-ARTIFACT-SAFETY-001
  - PRG-CTX7-001
  blockers: []
  acceptance:
  - Raw PDF bytes use a real binary parser; the legacy PDF JSONL adapter is explicit and cannot be selected through the extractor
    registry.
  - Untrusted parsing runs in a separate child with fixed permissions and bounded input, time, pages, per-page text, total
    text, output, stderr, memory settings, and concurrency.
  - Malformed, encrypted, no-text, timeout, crash, stderr/output flood, and protocol failures map to stable fail-closed errors.
  - The exact safety-verified buffer is parsed once and the resulting normalized document is passed to indexing without path
    reread or reparse.
  - Document chunk count and provider embedding batch size fail closed at fixed upper bounds before unbounded provider work.
  evidence:
  - Commit 3a7b531 pins pdfjs-dist 6.1.200 and @napi-rs/canvas 1.0.2 as exact direct production dependencies and copies the
    extraction worker into the runtime image.
  - The PDF worker accepts only stdin bytes and returns strict v1 JSON; its minimal environment/private cwd and Node permission
    flags deny unmanaged reads, writes, child processes, and worker threads while allowing the required native addon.
  - The scanner now receives a private 0700-directory/0600-file snapshot of the verified buffer; before/after snapshot hashes
    and a managed-path recheck close the observed A-to-B-to-A mutation window.
  - Document-library ingestion passes the normalized document plus exact verified bytes to vector indexing; direct raw-PDF
    indexing/backfill routes fail before provider invocation or file parsing.
  - Focused PDF/library/vector/indexer/corpus/backfill/artifact suites passed 80/80; canonical global Node summary passed
    498/498 with zero skips or failures.
  - Typecheck, build, Pages, inventory, contracts, and 6/6 domain evaluation passed; 16 changed Markdown files contained 11
    local links and zero missing targets.
  - npm audit --omit=dev reported zero vulnerabilities; the node:24.12.0-bookworm-slim production image built and a non-root
    in-container raw-PDF extraction smoke passed.
  - 'The controlled DMP remained ignored and untouched: acquired only, artifactSafety null, with no scan, extraction, indexing,
    promotion, or inventory mutation.'
  limitations:
  - 'The child is not a complete OS sandbox: no network namespace, seccomp profile, or hard total-RSS/native-memory cap has
    been proved.'
  - The parser uses a native canvas addon; concurrency is per application process rather than distributed, and no load/capacity
    gate has been run.
  - No OCR, table, form, or semantic-layout extraction exists; parser upgrades may change text normalization and hashes.
  - A real scanner, authenticated tenant-scoped API, durable object storage, job/retry/lock/audit/retention system, and tenant-scoped
    vector persistence remain absent.
  - The real DMP remains acquired only and has no clean malware verdict.
  pr: null
  ci: passed_local_with_platform_limitations
- id: WS03-TENANT-INGESTION-001
  workstream: WS-03
  title: Add tenant-scoped vector persistence and durable ingestion job controls
  status: completed_with_limitations
  owner: /root
  files:
  - .github/workflows/ci.yml
  - db/migrations/005_tenant_ingestion_runtime.sql
  - db/tests/tenant_ingestion_runtime_gate.sql
  - scripts/tenant-ingestion-postgres-smoke.mjs
  - src/security/tenant.ts
  - src/embeddings/chunkPlanner.ts
  - src/embeddings/indexer.ts
  - src/embeddings/pgVectorRepository.ts
  - src/embeddings/tenantPgVectorRepository.ts
  - src/embeddings/types.ts
  - src/ingestion/ingestionJobService.ts
  - src/ingestion/jobIdentity.ts
  - src/ingestion/jobTypes.ts
  - src/ingestion/vectorIndexing.ts
  - src/runtime/evidenceDependencies.ts
  - specs/056-tenant-vector-ingestion-runtime.md
  - docs/tenant-ingestion-runtime.md
  - docs/decisions/056-tenant-vector-ingestion-runtime.md
  - docs/risks/056-tenant-vector-ingestion-risk-register.md
  - docs/traceability/056-requirements-traceability.md
  depends_on:
  - WS03-PDF-EXTRACTION-001
  - WS07-FOUNDATION-001
  - PRG-CTX7-001
  blockers: []
  acceptance:
  - Every vector and ingestion-job read/write runs in one explicit tenant transaction and is protected by FORCE RLS for a
    non-owner, non-BYPASSRLS runtime role.
  - Raw idempotency material is digested; exact replay is stable, changed payloads conflict, and tenant-wide duplicate work
    converges under concurrency.
  - Claims use SKIP LOCKED leases with opaque tokens, heartbeat, stale-token fencing, bounded retries, terminal exhaustion,
    and allowlisted audit events.
  - Artifact identity is rechecked at enqueue and completion; vectors, version state, job state, stale-row replacement, and
    audit commit or roll back atomically.
  - Legacy unscoped vector rows are never assigned guessed ownership; unsafe migration order stops for explicit reviewed mapping.
  evidence:
  - Commit 9dcc054 implements migration 005, the non-owner SQL gate, the tenant repository, durable job service, bounded planner/provider
    flow, compiled PostgreSQL smoke, CI service, and Feature 056 governance artifacts.
  - Fresh migrations 001,002,003,004,005 and supported legacy migrations 001,002,011,003,004,005 passed on PostgreSQL 16.14
    with pgvector 0.8.5.
  - An unsafe post-003 legacy fixture with an unscoped vector row exited 3 with an explicit reviewed-tenant-mapping requirement;
    no ownership was inferred.
  - The table-non-owner NOSUPERUSER/NOBYPASSRLS SQL gate proved FORCE RLS, contract-v1 writes, A/B isolation, and zero visibility/write
    ability under missing or malformed tenant context.
  - The compiled smoke converged 50 concurrent idempotent submissions to one job and two concurrent claimers to one lease;
    stale leases and wrong artifact identity were fenced.
  - The compiled smoke also proved same chunk IDs can coexist across tenants, failed finalization rolls back all vectors/state,
    successful replacement removes stale chunks, and public-successful search is scoped.
  - Canonical regression passed 517/517 tests across 91 suites with zero failures, cancellations, or skips; typecheck and
    build passed.
  - Inventory remained valid at 17 total / 4 verified / 4 missing_source / 8 acquisition_pending / 1 acquired / 0 ingested;
    contracts passed 9/9 schemas and examples plus one OpenAPI document; domain evaluation passed 6/6.
  - npm audit --audit-level=high reported zero vulnerabilities; Pages build/verification and all 221 repository Markdown relative-link
    checks passed.
  - GitHub Actions Backend CI run 29702647686 passed commit 9dcc054 in 52 seconds, including the migration/RLS gate and compiled
    ingestion smoke.
  - Every database smoke reported controlledArtifactsRead 0; the DMP remained ignored, acquired only, artifactSafety null,
    and unscanned/unextracted/unindexed/unmodified.
  limitations:
  - There is no authenticated ingestion API or worker dispatcher, durable object storage, real scanner, tenant quota, total
    attempt deadline, dead-letter/operator tooling, or production monitoring.
  - The migration runtime-shape constraint is NOT VALID for preserved contract-0 legacy rows; a later reviewed inventory/validation
    migration is still required.
  - Vector search remains exact and intentionally unindexed until partition/index recall, plan, and load evidence supports
    a production design.
  - Procedure-query v1 remains keyword/phrase only pending authorization and retrieval-quality evaluation of the tenant vector
    path.
  - Production role provisioning/drift detection, HA, backup/restore, capacity, upgrade/rollback, staging, and deployment
    are unproved.
  - The controlled DMP cannot enter this path until the real scanner, authenticated API/worker, durable storage, and production
    controls operate.
