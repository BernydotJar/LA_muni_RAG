name: Verify 052R reconciliation

on:
  pull_request:
    branches:
      - stack-base/052-case-portfolio-dashboard-merged
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    if: github.head_ref == 'fix/052-post-merge-reconciliation-hardening' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Reconciliation integrity test
        run: node --import tsx --test src/__tests__/052-reconciliation-integrity.test.ts

      - name: Portfolio focused test
        run: node --import tsx --test src/__tests__/procedure-case-portfolio.test.ts

      - name: Source attribution focused test
        run: node --import tsx --test src/__tests__/procedure-official-source-attribution.test.ts

      - name: Domain evaluation
        run: npm run domain:evaluate

      - name: Full test suite
        run: npm run test

      - name: Build Pages artifact
        run: npm run build:pages

      - name: Verify Pages artifact
        run: node scripts/verify-pages-artifact.mjs

      - name: Diff integrity
        run: git diff --check "${{ github.event.pull_request.base.sha || github.event.before }}"...HEAD

      - name: Restore and clean generated Pages artifact
        shell: bash
        run: |
          git restore dist-pages || true
          git clean -nd -- dist-pages/
          git clean -fd -- dist-pages/

      - name: Verify clean generated state
        shell: bash
        run: |
          status="$(git status --short)"
          printf '%s\n' "$status"
          if [ -n "$status" ]; then
            echo "Unexpected generated or untracked files remain after verification."
            exit 1
          fi
