name: Backend CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-backend:
    name: Verify backend
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24.12.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Validate integration contracts
        run: npm run contracts:validate

      - name: Validate source inventory
        run: npm run source-inventory:validate

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Evaluate domain packs
        run: npm run domain:evaluate

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build backend
        run: npm run build
